services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: manut
      POSTGRES_PASSWORD: manut
      POSTGRES_DB: manutencao
    volumes:
      - manut_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U manut -d manutencao"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5433:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - manut_redis:/data
    ports:
      - "6380:6379"

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://manut:manut@db:5432/manutencao
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-demo-secret-trocar-em-prod-minimo-32-caracteres-aaaa}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:8765,https://manutencao.demos.napel.com.br}
      EVOLUTION_ENABLED: "false"
      FEATURE_SIGE_ENABLED: "false"
      STAGE: demo
      LOG_LEVEL: INFO
      UPLOAD_DIR: /app/data/uploads
      SERVE_FRONTEND: "true"
    volumes:
      - manut_uploads:/app/data/uploads
    ports:
      - "8765:8000"

volumes:
  manut_pgdata:
  manut_redis:
  manut_uploads:
